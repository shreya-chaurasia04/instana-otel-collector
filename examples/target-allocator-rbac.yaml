---
# RBAC for OpenTelemetry Collectors to query Target Allocator
# The collectors need to be able to query the target allocator service
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: idot-collector-targetallocator-client
  labels:
    app.kubernetes.io/name: idot-collector
    app.kubernetes.io/component: opentelemetry-collector
rules:
  # Collectors need to query the target allocator service
  - apiGroups: [""]
    resources:
      - services
    verbs: ["get"]
    resourceNames:
      - idot-targetallocator

---
# ClusterRoleBinding for collector access to target allocator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: idot-collector-targetallocator-client
  labels:
    app.kubernetes.io/name: idot-collector
    app.kubernetes.io/component: opentelemetry-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: idot-collector-targetallocator-client
subjects:
  # DaemonSet collector service account
  - kind: ServiceAccount
    name: idot-daemonset-opentelemetry-collector
    namespace: instana-collector
  # StatefulSet collector service account
  - kind: ServiceAccount
    name: idot-statefulset-opentelemetry-collector
    namespace: instana-collector

---
# NetworkPolicy to allow collectors to communicate with target allocator
# This is optional but recommended for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: idot-targetallocator
  namespace: instana-collector
  labels:
    app.kubernetes.io/name: idot-targetallocator
    app.kubernetes.io/component: target-allocator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: target-allocator
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from collectors
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 80
    # Allow traffic from monitoring/debugging tools (optional)
    - from:
        - namespaceSelector:
            matchLabels:
              name: instana-collector
      ports:
        - protocol: TCP
          port: 80

