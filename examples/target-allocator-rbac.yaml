---
# Usage Instructions:
# 
# 1. Apply this RBAC configuration before installing the Helm chart:
#    kubectl apply -f target-allocator-rbac.yaml
#
# 2. The Helm chart should automatically use these service accounts
#    If not, you can specify them in values.yaml:
#    
#    targetAllocator:
#      serviceAccount:
#        create: false
#        name: idot-targetallocator
#
# 3. Verify RBAC permissions:
#    kubectl auth can-i list servicemonitors --as=system:serviceaccount:instana-collector:idot-targetallocator
#    kubectl auth can-i list pods --as=system:serviceaccount:instana-collector:idot-targetallocator
#
# 4. Troubleshoot RBAC issues:
#    kubectl logs -l app.kubernetes.io/component=target-allocator -n instana-collector
#    # Look for "forbidden" or "unauthorized" errors

