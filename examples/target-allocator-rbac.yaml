# RBAC Configuration for Target Allocator
# This file contains the necessary Kubernetes RBAC permissions for the target allocator
# to discover and manage Prometheus scrape targets.

---
# ServiceAccount for Target Allocator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: idot-targetallocator
  namespace: instana-collector
  labels:
    app.kubernetes.io/name: idot-targetallocator
    app.kubernetes.io/component: target-allocator

---
# ClusterRole with permissions for target discovery
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: idot-targetallocator
  labels:
    app.kubernetes.io/name: idot-targetallocator
    app.kubernetes.io/component: target-allocator
rules:
  # Required for ServiceMonitor and PodMonitor discovery
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - servicemonitors
      - podmonitors
    verbs: ["get", "list", "watch"]
  
  # Required for service discovery and endpoint resolution
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  
  # Required for node discovery (for node-level metrics)
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]
  
  # Required for namespace discovery
  - apiGroups: [""]
    resources:
      - namespaces
    verbs: ["get", "list", "watch"]
  
  # Required for ConfigMap-based configuration (optional)
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get", "list", "watch"]
  
  # Required for Ingress discovery (if scraping ingress metrics)
  - apiGroups: ["networking.k8s.io", "extensions"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding to bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: idot-targetallocator
  labels:
    app.kubernetes.io/name: idot-targetallocator
    app.kubernetes.io/component: target-allocator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: idot-targetallocator
subjects:
  - kind: ServiceAccount
    name: idot-targetallocator
    namespace: instana-collector

---
# Optional: Role for namespace-scoped operations
# Use this if you want to limit target allocator to specific namespaces
# apiVersion: rbac.authorization.k8s.io/v1
